<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poniyama - リンク集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>poniyama</h1>
            <p class="subtitle">poniyamaのリンク集</p>
        </header>

        <main>
            <section class="links-section">
                <h2>各種リンク</h2>
                <div class="links-grid">
                    <a href="https://twitter.com/poniyama" class="link-card twitter">
                        <div class="icon">𝕏</div>
                        <div class="label">Twitter</div>
                    </a>

                    <a href="https://soundcloud.com/poniyama" class="link-card soundcloud">
                        <div class="icon">♫</div>
                        <div class="label">Soundcloud</div>
                    </a>

                    <a href="https://discord.gg/poniyama" class="link-card discord">
                        <div class="icon">💬</div>
                        <div class="label">Discord</div>
                    </a>

                    <a href="https://www.flickr.com/photos/poniyama" class="link-card flickr">
                        <div class="icon">📷</div>
                        <div class="label">Flickr</div>
                    </a>

                    <a href="https://note.com/poniyama" class="link-card note">
                        <div class="icon">📝</div>
                        <div class="label">note</div>
                    </a>

                    <a href="https://bsky.app/profile/poniyama.bsky.social" class="link-card bluesky">
                        <div class="icon">🌐</div>
                        <div class="label">Bluesky</div>
                    </a>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 poniyama. All rights reserved.</p>
        </footer>
